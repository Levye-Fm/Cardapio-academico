<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recarga/Saldo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <button class="fechar" type="button">X</button>

    <div class="container">
        <div class="saldo-cartao">
            <div class="saldo-info">
                <div class="icone">
                    <img src="img/carteira.png" alt="Carteira">
                </div>
                <div>
                    <p>Seu saldo:</p>
                    <h2>R$ 2,50 Reais</h2>
                </div>
            </div>
        </div>
        <div class="form-cartao">
            <h1>Recarregar</h1>
            <hr>
            <p>Selecione a forma de pagamento</p>
            <div class="pagamento">
                <label>
                    <img src="img/pix.png" alt="Pix">
                    <input type="radio" name="payment" value="pix"> Pix
                </label>
                <label>
                    <img src="img/cartao.jpg" alt="Cartão de Débito">
                    <input type="radio" name="payment" value="debit"> Cartão de Débito
                </label>
            </div>
            <form>
                <input type="text" placeholder="Informe a sua matrícula" required>
                <input type="email" placeholder="Email" required>
                <button type="button" class="btn">Continuar</button>
            </form>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
