<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagamento</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <button class="fechar" type="button">X</button>
    <button class="continuar" type="button">Continuar</button>
    <div class="container">
        <div class="pagamento-box">
            <div class="pagamento-info">
                <div class="icone">
                    <img src="img/qrcode.png" alt="Código QR">
                </div>
                <div>
                    <strong style="font-size: 50px;">Código de pagamento gerado</strong>
                    <br><br>
                    <strong style="font-size: 30px;">ou</strong>
                    <br><br>
                    <strong>XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX.XXXXXXXXXXXXXXXXXXXX</strong>
                    <strong>XXXXXXXXXXXXXXXXXXXX.XXXXXXXXXXXXXXXXXXXXXXXXXXXX</strong>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
